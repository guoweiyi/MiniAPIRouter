name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: true
        type: string
      release_notes:
        description: '更新说明'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set version
        run: mvn versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false

      - name: Build
        run: mvn clean package -DskipTests

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: ${{ inputs.release_notes }}
          files: |
            ai-router-standalone/target/ai-router-standalone-${{ inputs.version }}.jar
            ai-router-saas/target/ai-router-saas-${{ inputs.version }}.jar
