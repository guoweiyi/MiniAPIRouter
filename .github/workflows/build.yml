name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: true
        type: string
      release_notes:
        description: '更新说明（功能更新 / Bug 修复）'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
      head-sha: ${{ steps.commit-version.outputs.sha }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Generate changelog
        id: changelog
        run: |
          git fetch --tags
          PREV_TAG=$(git tag --sort=-creatordate | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:'- %s  (`%h`)' --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:'- %s  (`%h`)' --no-merges)
          fi
          {
            echo 'changelog<<EOF'
            echo "$CHANGELOG"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Set version
        run: mvn versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false

      - name: Build
        run: mvn clean package -DskipTests

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            ai-router-standalone/target/ai-router-standalone-${{ inputs.version }}.jar
            ai-router-saas/target/ai-router-saas-${{ inputs.version }}.jar
          retention-days: 1

      - name: Commit version bump
        id: commit-version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml */pom.xml
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ inputs.version }}"
          git push
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # ── 各平台原生打包 (jlink + jpackage) ───────────────────────────────
  package:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-latest
            platform: macos-arm64
          - os: windows-latest
            platform: win-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: jars

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Package native apps
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          PLATFORM="${{ matrix.platform }}"

          FALLBACK_MODULES="java.base,java.compiler,java.datatransfer,java.desktop,\
          java.instrument,java.logging,java.management,java.management.rmi,\
          java.naming,java.net.http,java.prefs,java.rmi,java.scripting,\
          java.security.jgss,java.security.sasl,java.sql,java.transaction.xa,\
          java.xml,jdk.httpserver,jdk.management,jdk.unsupported,jdk.zipfs"

          pack_app() {
            local JAR_FILE="$1"
            local MAIN_CLASS="$2"
            local APP_NAME="$3"
            local PREFIX="$4"
            local APP_IMAGE_PATH="dist/${APP_NAME}"

            if [[ "${RUNNER_OS}" == "macOS" ]]; then
              APP_IMAGE_PATH="dist/${APP_NAME}.app"
            fi

            echo "::group::Packaging ${APP_NAME} for ${PLATFORM}"

            # Spring Boot fat JAR 无法被 jdeps 直接分析 (嵌套 BOOT-INF/lib 结构)
            # 使用 Spring Boot 3.x 全覆盖模块列表, JRE 约 45MB
            MODULES="${FALLBACK_MODULES}"
            echo "Modules: ${MODULES}"

            # 裁剪 JRE
            jlink \
              --add-modules "${MODULES}" \
              --strip-debug \
              --no-man-pages \
              --no-header-files \
              --compress zip-6 \
              --output jre

            # 生成原生包
            jpackage \
              --name "${APP_NAME}" \
              --input "$(dirname "${JAR_FILE}")" \
              --main-jar "$(basename "${JAR_FILE}")" \
              --main-class "${MAIN_CLASS}" \
              --type app-image \
              --runtime-image jre \
              --dest dist \
              --app-version "${VERSION}" \
              --vendor "MiniAPI"

            # 按平台归档
            if [[ "${RUNNER_OS}" == "Windows" ]]; then
              powershell -Command "Compress-Archive -Path '${APP_IMAGE_PATH}' -DestinationPath '${PREFIX}-${VERSION}-${PLATFORM}.zip'"
            else
              tar czf "${PREFIX}-${VERSION}-${PLATFORM}.tar.gz" -C dist "$(basename "${APP_IMAGE_PATH}")"
            fi

            rm -rf jre dist
            echo "::endgroup::"
          }

          pack_app \
            "ai-router-standalone/target/ai-router-standalone-${VERSION}.jar" \
            "com.miniapi.router.standalone.MiniApiStandaloneApplication" \
            "MiniAPIRouter-Standalone" \
            "MiniAPIRouter-standalone"

          pack_app \
            "ai-router-saas/target/ai-router-saas-${VERSION}.jar" \
            "com.miniapi.router.saas.MiniApiSaasApplication" \
            "MiniAPIRouter-SaaS" \
            "MiniAPIRouter-saas"

          echo "::group::Artifacts"
          ls -lh *.tar.gz *.zip 2>/dev/null || true
          echo "::endgroup::"

      - name: Upload native packages
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: |
            *.tar.gz
            *.zip
          retention-days: 1

  # ── 创建 GitHub Release ─────────────────────────────────────────────
  release:
    needs: [build, package]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.build.outputs.head-sha }}

      - name: Download native packages
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          merge-multiple: true
          path: packages

      - name: Download JARs
        uses: actions/download-artifact@v4
        with:
          name: jars
          path: packages

      - name: List artifacts
        run: ls -lh packages/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: |
            ${{ inputs.release_notes }}

            ## 提交记录
            ${{ needs.build.outputs.changelog }}
          files: |
            packages/*.jar
            packages/*.tar.gz
            packages/*.zip
