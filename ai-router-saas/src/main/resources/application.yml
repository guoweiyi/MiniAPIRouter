server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: miniapi-router-saas
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SAAS_DB_URL}
    username: ${SAAS_DB_USERNAME}
    password: ${SAAS_DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  data:
    redis:
      host: ${SAAS_REDIS_HOST}
      port: 6379
      password: ${SAAS_REDIS_PASSWORD}
      database: 0
      timeout: 5000
  jackson:
    default-property-inclusion: non_null
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

miniapi:
  router:
    crypto-secret: ${SAAS_CRYPTO_SECRET}
    blob-storage-path: ${user.home}/.miniapirouter/logs
    jwt-secret: ${SAAS_JWT_SECRET}
    jwt-expiration: 86400000

logging:
  level:
    com.miniapi.router: INFO
    org.springframework.security: INFO
